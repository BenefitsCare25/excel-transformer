# GitHub Actions workflow for deploying to Azure App Service
# This file enables automatic deployment when you push to main branch

name: Deploy to Azure App Service

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:  # Allow manual trigger

env:
  AZURE_WEBAPP_NAME: excel-transformer-rg    # Azure App Service name
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # Checkout code from GitHub
    - name: Checkout code
      uses: actions/checkout@v4

    # ========================================
    # BACKEND BUILD (Python/Flask)
    # ========================================
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install Python dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # ========================================
    # FRONTEND BUILD (React)
    # ========================================
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Build React frontend
      run: |
        cd frontend
        npm ci
        npm run build
      env:
        # Production API URL - update this to your Azure backend URL
        REACT_APP_API_URL: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net

    # Copy frontend build to backend/static for serving
    - name: Copy frontend to backend
      run: |
        mkdir -p backend/static
        cp -r frontend/build/* backend/static/

    # ========================================
    # DEPLOY TO AZURE
    # ========================================
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ./backend

    # ========================================
    # HEALTH CHECK
    # ========================================
    - name: Health check
      run: |
        sleep 30  # Wait for deployment to complete
        curl -f https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/health || exit 1
