<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Excel Template Transformer - Convert Excel files to desired template format"
    />
    <title>Excel Template Transformer</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <!-- CBRE AI Chatbot Widget (Sandboxed Iframe) -->
    <iframe
      id="chat-widget-iframe"
      src="https://app-aibot-api.azurewebsites.net/chat?company=9bc1ab0f-eff8-4d2d-b224-e097f4851a2a&color=%233b82f6"
      style="position: fixed; bottom: 16px; right: 16px; width: 200px; height: 80px; border: none; background: transparent; z-index: 9999; transition: all 0.3s ease;"
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
      allow="clipboard-write"
      allowtransparency="true"
      title="CBRE Chat Widget">
    </iframe>
    <script>
    (function() {
      var iframe = document.getElementById('chat-widget-iframe');
      window.addEventListener('message', function(event) {
        if (event.data && event.data.type === 'chatWidgetResize') {
          var w = event.data.width;
          var h = event.data.height;
          // Handle percentage or pixel values (vw/vh/%)
          iframe.style.width = typeof w === 'string' ? w : w + 'px';
          iframe.style.height = typeof h === 'string' ? h : h + 'px';
          // Keep in corner - mobile may need edge positioning
          var isMobile = window.innerWidth < 480;
          if (event.data.state === 'open' && isMobile) {
            iframe.style.bottom = '0';
            iframe.style.right = '0';
          } else {
            iframe.style.bottom = '16px';
            iframe.style.right = '16px';
          }
        }
      });
    })();
    </script>
  </body>
</html>
